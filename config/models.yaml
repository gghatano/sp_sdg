# Model registry. Validation data for early stopping is carved out of the
# training split only (never test data; see spec section 8).
models:
  cnn1d:
    type: cnn1d
    params:
      epochs: 100
      patience: 15
      batch_size: 32
      lr: 0.001
      val_fraction: 0.2
      hidden: 64

  cnn1d_smoke:
    type: cnn1d
    params:
      epochs: 15
      patience: 5
      batch_size: 16
      lr: 0.001
      val_fraction: 0.25
      hidden: 16

  minirocket:
    type: minirocket
    params:
      n_kernels: 10000

  minirocket_smoke:
    type: minirocket
    params:
      n_kernels: 500
