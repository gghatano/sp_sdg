# PAMAP2 negative control (issue #21 DS-2): the label_shuffle augmentation must
# NOT reduce the required subject count. Same setup as pamap2_subject_count.yaml,
# one augmentation. Runs land alongside the PAMAP2 main curves (same name).
# label_shuffle = original signals kept + labels permuted (a pessimistic
# label-noise control, per the #23 re-interpretation); the pure quantity baseline
# is oversample.
phase: 6
name: pamap2_subject_count   # same name so runs join the PAMAP2 curves
dataset: PAMAP2
model: cnn1d_har
subject_counts: [2, 3, 4, 5]
repeats: 5
augmentations: [label_shuffle]
# must match pamap2_subject_count.yaml so the control shares the same window set
dataset_params:
  window: 168
  split_seed: 0
  n_test_subjects: 3
  normalize: per_window_z
  downsample_hz: 33
  exclude_subjects: [109]
  channels:
    - hand_acc16_x
    - hand_acc16_y
    - hand_acc16_z
    - chest_acc16_x
    - chest_acc16_y
    - chest_acc16_z
    - ankle_acc16_x
    - ankle_acc16_y
    - ankle_acc16_z
  archive_sha256: "76b3580bd5a804121f507717cb498c66a312ef5c774f4a78ac470e6558add352"
target_metric: macro_f1
target_value: 0.70   # from full-pool none baseline per the registered rule (see pamap2_subject_count.yaml)
pre_registered: true
pre_registration_note: artifacts/pre_registration.md
