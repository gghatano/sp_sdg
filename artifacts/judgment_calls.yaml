# judgment_calls.yaml
# 「エイヤッと決めたこと」= 一意に定まらず判断で決めた設定。再現・追試時の解釈に必須。
# 原論文からの実装差分(deviations.md)と重なるものは source に明記。
# fields: id / topic / decision / why / alternatives / sensitivity(結論への影響) / preregistered / source
# 更新規約は skill /reproducibility-notes を参照。

intro: >-
  以下は、原理的に一意には決まらず本プロジェクトが判断で固定した設定である。追試・移植の際は
  これらが結論(とくに被験者数削減の可否)にどれだけ効くかを sensitivity 欄で確認すること。
  事前登録済み(preregistered=true)の項目は結果を見る前に固定しており、事後調整はしていない。

calls:
  - id: J-TARGET
    topic: 目標性能 τ(被験者数削減の判定基準)
    decision: "test accuracy = 0.90 を目標に固定。"
    why: "Anguita et al. (2013) が561次元特徴+SVM で約0.90を報告。生信号+深層は0.90–0.95が相場。文献由来の丸い値。"
    alternatives: "0.85 / 0.95、あるいは macro-F1 基準。"
    sensitivity: "高。N* は学習曲線上の閾値到達点なので τ を上げ下げすると N* と削減率が動く。事前登録で恣意性を排除。"
    preregistered: true
    source: "artifacts/pre_registration.md"
  - id: J-REPEATS
    topic: 被験者数の反復回数
    decision: "各被験者数 N で3反復(異なる被験者部分集合)。"
    why: "CPU 実行時間と網羅性のバランス。"
    alternatives: "10–20 反復で検出力を確保。"
    sensitivity: "高。反復3回のため N* の信頼区間が広く、多くの手法で none や negative control と重なる。削減を確定できない最大の理由(Phase 6 の課題)。"
    preregistered: true
    source: "artifacts/pre_registration.md / limitations.md"
  - id: J-METHODS
    topic: 被験者データへ持ち込む拡張手法の選定
    decision: "mixup / dtw / smote / oversample / scaling の5手法。jitter は除外、none は基準として常時含む。"
    why: "Phase 2 で 1D-CNN において Holm 補正後も有意だった手法を採用。被験者データの主モデルが 1D-CNN のため CNN の結果で選定。"
    alternatives: "MiniRocket 基準で選ぶ(ただし MiniRocket では全手法非有意)、または全7手法を持ち込む。"
    sensitivity: "中。選定はモデル依存。MiniRocket では拡張効果が出ないため、モデルを変えると持ち込む手法集合が変わりうる。"
    preregistered: false
    source: "decision_log.md(2026-07-12)/ config Phase 4"
  - id: J-WISDM-TARGET
    topic: WISDM v1.1 の目標性能 τ(issue #21 DS-1)
    decision: "test accuracy = 0.80 を目標に固定(UCI HAR の 0.90 は流用しない)。"
    why: "WISDM v1.1 は手作り特徴+被験者混在で ~0.90+ の文献値だが、生信号 CNN+被験者分離では相場が下がる。天井/床を避け曲線最急部を狙う round 値。結果を見る前に登録。"
    alternatives: "0.75 / 0.85、または macro-F1 基準。UCI HAR の 0.90 を流用(不適: データ・評価条件が異なる)。"
    sensitivity: "高。N* は τ 到達点なので値で削減率が動く。UCI HAR と独立に事前登録して恣意性を排除。加えて 0.80 は none 曲線のプラトー肩付近にあたり手法差が圧縮されやすい(急峻部でより敏感になりうる)。判定指標も accuracy 固定だが、WISDM はクラス不均衡のため macro-F1 では手法順位が変わる(smote のみ僅かに正、dtw が最下位。いずれも none の CI と重なり削減は macro-F1 でも非確認)。指標依存は限界節・F-12 に記録。"
    preregistered: true
    source: "artifacts/pre_registration.md(WISDM 節)"
  - id: J-WISDM-WINDOW
    topic: WISDM の窓化
    decision: "(subject,activity) 連続区間内で 200 サンプル(約10秒)非重複窓。"
    why: "20Hz で 200 サンプルは WISDM 標準の窓長。非重複でセット内窓相関を避け、区間内窓化で単一ラベルを保証。"
    alternatives: "50% オーバーラップ(サンプル数増だが窓相関増)、窓長 128/256。"
    sensitivity: "中。窓長・重複は窓数と相関構造を変え学習曲線に影響しうる。被験者跨ぎリークは group split で別途防止。"
    preregistered: true
    source: "src/signal_aug/data/wisdm.py(make_windows)"
  - id: J-WISDM-NORM
    topic: WISDM の正規化方針(UCI HAR とは逆)
    decision: "窓ごと・チャネルごとに z 正規化を適用する。"
    why: "WISDM 生値は m/s^2 スケール(~±20)で CNN 初段の想定より大きい。窓単位正規化はリーク無し(各窓が自分の統計のみ使用)。UCI HAR は配布元整形済みのため非正規化(J-HAR-NORM)だが、WISDM は生値のため方針が異なる。"
    alternatives: "非正規化(スケール差で学習不安定の恐れ)、被験者/データセット統計での正規化(リーク or 追加設計が必要)。"
    sensitivity: "中。振幅情報が落ちるが HAR は波形パターンが主判別要因。UCI HAR(非正規化)と WISDM(窓ごと z 正規化)で前処理が非対称なため、scaling/jitter のような振幅系の摂動は正規化後と生データで作用が異なる。ゆえに WISDM への展開は『同一枠組みの厳密再現』ではなく『前処理を dataset に合わせた追試』と位置づける。両データの結果差には前処理の非対称も寄与しうる。"
    preregistered: true
    source: "src/signal_aug/data/wisdm.py(_znorm_window)"
  - id: J-WISDM-SPLIT
    topic: WISDM の固定 test 被験者選定(公式 split 無し)
    decision: "seed-0 シャッフルでソート済み被験者から 12 名を test、残り 24 名を pool。"
    why: "WISDM に公式 train/test split が無いため。12/36 ≈ UCI HAR の約30% test 比率に合わせた。決定的で再現可能、data/metadata/wisdm.json に記録。"
    alternatives: "別 seed、別比率(例 9/27)、被験者を跨ぐ交差検証。"
    sensitivity: "中。test 被験者の引きで到達精度が変わりうるが、pool 側の被験者数曲線が主対象。seed 固定で再現。"
    preregistered: true
    source: "src/signal_aug/data/wisdm.py(_split_subjects)"
  - id: J-HAR-NORM
    topic: UCI HAR の正規化方針
    decision: "生信号(g 単位)のまま z 正規化を適用しない。"
    why: "配布元が total_acc(重力込み)/ body_acc(重力除去)として整形済みで、被験者間の物理スケールを保持したいため。"
    alternatives: "UCR と同様に系列単位 z 正規化を当てる。"
    sensitivity: "中。正規化を入れると学習曲線と N* が変わりうる。前処理タブの不定性と対応(preprocessing_notes: UCI HAR)。"
    preregistered: false
    source: "src/signal_aug/data/uci_har.py"
  - id: J-DTW
    topic: DTW ベース拡張の実装
    decision: "同一クラス2サンプルの DTW 整列平均(ペアワイズ簡略版)。"
    why: "Forestier et al. (2017) の DBA(多サンプル重心)の計算コストを避けた簡略版。"
    alternatives: "DBA による多サンプル重心平均。"
    sensitivity: "中。多様性が DBA より低く、DTW の削減効果を過小評価している可能性。点推定では DTW が最大削減だが確定はしない。"
    preregistered: false
    source: "deviations.md / decision_log.md"
  - id: J-MIXUP
    topic: mixup の実装
    decision: "同一クラスペアに限定しハードラベルを維持。"
    why: "RidgeClassifier がソフトラベル非対応で、モデル間の条件を揃えるため。"
    alternatives: "原論文(Zhang et al. 2018)の異クラス凸結合+ソフトラベル。"
    sensitivity: "中。効果は原論文より控えめになりうる。"
    preregistered: false
    source: "deviations.md / decision_log.md"
  - id: J-SMOTE
    topic: raw-SMOTE の適用範囲
    decision: "生信号の平坦化ベクトル空間で全クラスに適用。"
    why: "特徴量空間を介さず信号レベルで拡張を統一するため。"
    alternatives: "原論文(Chawla et al. 2002)どおり特徴量空間・少数クラスのみ。"
    sensitivity: "低〜中。不均衡データでの挙動が原論文と異なる。"
    preregistered: false
    source: "deviations.md"
  - id: J-CNN
    topic: 1D-CNN の構成
    decision: "3ブロック(Conv-BN-ReLU-Pool)+ GAP の標準構成。"
    why: "特定論文の厳密再現ではなく Fawaz et al. (2019) の FCN 系を簡略化した標準ベースライン。"
    alternatives: "ResNet / InceptionTime 等のより深い時系列分類器。"
    sensitivity: "中。モデル容量は拡張効果の出方に影響しうる(H2: 効果はモデル依存)。"
    preregistered: false
    source: "deviations.md"
  - id: J-SMOKE-EPOCHS
    topic: smoke 用 CNN の epoch 数
    decision: "15 epochs。"
    why: "3 epochs では合成データでも未学習(精度0.475)だったため。"
    alternatives: "早期打ち切り / 固定10。"
    sensitivity: "無(smoke は基盤動作確認のみで、研究結果には使わない)。"
    preregistered: false
    source: "decision_log.md / config/models.yaml"
  - id: J-DATASETS
    topic: Phase 2 データセット12件の選定
    decision: "小〜中規模・ドメイン多様・2値/多クラス混在で12件を選定。FordA は学習コスト過大のため除外。"
    why: "低データ条件を検証しやすく、CPU で現実的な実行時間に収めるため。"
    alternatives: "UCR 全128データセット、または FordA を含む大規模データ。"
    sensitivity: "中。データセット集合により平均的な拡張効果の見え方が変わる(H2)。"
    preregistered: false
    source: "decision_log.md(2026-07-12)/ config/experiments/phase2.yaml"
  - id: J-NSTAR
    topic: N*(必要被験者数)の推定法
    decision: "学習曲線の隣接点を線形補間して目標到達点を求める。"
    why: "少数の測定点から閾値到達被験者数を素直に推定するため。"
    alternatives: "対数/べき乗則フィット、単調回帰(isotonic)。"
    sensitivity: "中〜高。曲線が非単調・ノイジーだと補間点が振れる。実際 WISDM の none 曲線は非単調(中盤で最大に達し以降やや低下)で、目標 0.80 の交差は 12→15 名の単一の上向き交差に依存する。複数交差時は最初の到達点を採る(interpolate)。この非単調性は N* 不確実性の一因で、手法間 N* 差(WISDM smote で被験者 1.48 名)は被験者格子間隔(3)・セル内 std・bootstrap CI より小さいため、反復増まで手法順位は報告しない。bootstrap で CI を付す。"
    preregistered: true
    source: "pre_registration.md / reporting/aggregate.py"
  - id: J-PAMAP2-TARGET
    topic: PAMAP2 の目標性能 τ とその選択ルール(issue #21 DS-2)
    decision: "主指標 macro-F1。target = full-pool(N=5, aug=none)の held-out macro-F1 平均 − 0.05 を 0.05 刻みで切り捨てた値(ルールを数値確定前に登録)。UCI HAR 0.90 / WISDM 0.80 は流用しない。"
    why: "PAMAP2 は 12活動でクラス不均衡のため主指標を macro-F1 に(#23 V2 の教訓)。target は none baseline のみに依存する手続きで決め、拡張手法の結果に依存させない(手法有利化の排除)。曲線急峻部に置き天井/床を回避。"
    alternatives: "固定丸め値(0.60/0.65 等)、accuracy 基準、−0.10 マージン。"
    sensitivity: "高。N* は τ 到達点なので値で削減率が動く。ルール駆動で恣意性を排除。target 絶対値は 3 データで異なるが削減率(無次元)で横断比較する。"
    preregistered: true
    source: "artifacts/pre_registration.md(PAMAP2 DS-2 節)/ config/experiments/pamap2_subject_count.yaml"
  - id: J-PAMAP2-EXCLUDE109
    topic: subject 109 の除外(データ有無で機械決定)
    decision: "subject 109 を除外(pool=5 [101,102,106,107,108]、test=3 [103,104,105]、subject_counts={2,3,4,5})。"
    why: "実測で 109 は総窓数 10・12活動中 1活動のみ(rope_jumping のみ)、他被験者 247–301 窓・8–12 活動と桁違いに欠損(生ファイル 3.9MB 対 118–207MB)。事前登録した基準『欠ける活動数が著しい/窓数が極端に少なければ除外』に機械的に該当。精度ではなくデータ有無で決定。"
    alternatives: "保持(pool=6)。ただし 109 はほぼ全活動欠落で学習に寄与せずクラス欠落を悪化させる。"
    sensitivity: "中。pool を 5 に減らすと N 格子分解能が下がる。ただし 109 保持は活動サポートを大きく歪めるため除外がデータ的に妥当。除外後 rope_jumping が希少化(pool 4窓・test 0窓)し macro-F1 を不安定化しうる点は限界として記録。"
    preregistered: true
    source: "data/metadata/pamap2.json(per_subject_activity_support)/ pre_registration.md"
  - id: J-PAMAP2-CHANNELS
    topic: PAMAP2 のチャネル選択
    decision: "加速度 ±16g のみ 9ch(hand/chest/ankle × x/y/z)。orientation(無効4/IMU)・HR・±6g・ジャイロ・磁気を除外。"
    why: "WISDM(加速度3ch)/UCI HAR(加速度+ジャイロ6ch)との加速度ドメイン整合、モデル入力の単純化。±16g は ±6g の飽和クリップを回避。orientation は公式に無効、HR は 9Hz 非同期で大半 NaN。"
    alternatives: "加速度+ジャイロ 18ch(情報量重視)。チャネル数は横断比較の交絡。"
    sensitivity: "中。チャネル集合で分類難度が変わり削減率にも影響しうる。チャネル数差(9/6/3)は横断図の交絡として図注明記。"
    preregistered: true
    source: "src/signal_aug/data/pamap2.py(DEFAULT_CHANNELS)/ config"
  - id: J-PAMAP2-WINDOW
    topic: PAMAP2 の窓化・ダウンサンプル
    decision: "100→33.3Hz(stride-3 間引き)、168サンプル(~5.0s)非重複窓、(subject,activity) 連続区間内、NaN 含む窓は破棄。"
    why: "窓の実時間長を WISDM(10s)/UCI HAR(2.56s)と近づけ横断交絡を減らす(完全一致は不可能)。33.3Hz は複数実装の慣例。非重複でセット内窓相関を回避、区間内窓化で単一ラベル保証。NaN(無線ドロップアウト)窓破棄はリーク無しで単純。"
    alternatives: "窓長 128/256、50% オーバーラップ、線形補間による NaN 補完、6g レンジ併用。"
    sensitivity: "中。窓長・レートは窓数と学習曲線に影響。被験者跨ぎリークは group split で別途防止。"
    preregistered: true
    source: "src/signal_aug/data/pamap2.py(make_windows/downsample_factor)"
  - id: J-PAMAP2-NORM
    topic: PAMAP2 の正規化方針
    decision: "窓ごと・チャネルごと z 正規化(WISDM と同じ、リーク無し)。"
    why: "PAMAP2 生加速度スケールを吸収。各窓が自分の統計のみ使用しリーク無し。WISDM と揃え DS-1/DS-2 の前処理を一貫させる。"
    alternatives: "非正規化、被験者/データセット統計での正規化(リーク or 追加設計)。"
    sensitivity: "中。振幅情報が落ちるが HAR は波形パターンが主判別要因。UCI HAR(非正規化)とは非対称のため『前処理を dataset に合わせた追試』と位置づける(WISDM と同じ扱い)。"
    preregistered: true
    source: "src/signal_aug/data/pamap2.py(_znorm_window)"
