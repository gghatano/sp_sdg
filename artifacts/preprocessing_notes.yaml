# preprocessing_notes.yaml
# データ前処理の補足と不定性(reproducibility に効くもの)。
# レポート「再現・前処理」タブへ自動描画。実装(src/signal_aug/data/)と対応させて更新する。
# uncertainty: 再現時に結果を左右しうる注意点・判断の余地。

intro: >-
  前処理は src/signal_aug/data/ に実装され、config ではなくコードで定義される。以下は
  再現時に効く前処理の要点と、実装上の判断・不定性である。すべての正規化・当てはめは
  学習データにのみ行い、test データには波及しない設計になっている。

notes:
  - stage: 正規化(z 正規化)
    scope: "UCR データセット"
    detail: "各系列・各チャネルごとに時間軸方向で平均0・分散1へ正規化(_znorm)。train と test に同一処理を当てるが、統計量は系列単位で完結するためデータセット統計の共有(=リーク)は生じない。"
    uncertainty: "サンプル単位正規化のため系列全体の振幅情報は落ちる。振幅が判別に効くデータでは前処理の選択が精度に影響しうる。"
  - stage: 正規化(z 正規化)
    scope: "UCI HAR(被験者数実験の主対象)"
    detail: "9チャネル慣性信号(body_acc/body_gyro/total_acc の x/y/z)を原スケール(g 単位)のまま用い、z 正規化は適用しない。"
    uncertainty: "UCR とは正規化方針が異なる。total_acc は重力込み・body_acc は重力除去済みという配布元の前処理に依存しており、追加正規化を入れると学習曲線・N* が変わりうる。ここは意図的な判断(judgment_calls: J-HAR-NORM)。"
  - stage: 窓化(windowing)
    scope: "UCI HAR"
    detail: "配布元が生成した固定窓(128サンプル=2.56秒、50% オーバーラップ)をそのまま使用し、再窓化はしない。窓ごとに被験者IDが付与される。"
    uncertainty: "同一被験者の重複窓が複数現れるが、被験者跨ぎリークは group split で防止(同一被験者は train と test に同時に現れない)。窓長・オーバーラップは配布元定義に固定。"
  - stage: 正規化(z 正規化)
    scope: "WISDM v1.1(第2の被験者データ、issue #21 DS-1)"
    detail: "3チャネル加速度を窓ごと・チャネルごとに平均0・分散1へ z 正規化(_znorm_window)。各窓が自分の統計のみ使うためリークは生じない。UCI HAR(非正規化)とは方針が異なる(judgment_calls: J-WISDM-NORM)。使用データは WISDM v1.1(Kwapisz et al. 2011, 36名)であり、より大規模な 2019 年の biometrics 版(Weiss et al. 2019, 51名)とは別データである。"
    uncertainty: "WISDM 生値は m/s^2 スケールで CNN 初段の想定より大きいため正規化する。振幅情報は落ちるが波形パターンが主判別要因。UCI HAR(非正規化)と WISDM(窓ごと z 正規化)で前処理が非対称なため、scaling/jitter のような振幅系の摂動は正規化後と生データで作用が異なる。したがって WISDM への展開は『同一枠組みの厳密再現』ではなく『前処理を dataset に合わせた追試』であり、結果比較時に留意する。"
  - stage: 窓化(windowing)
    scope: "WISDM v1.1"
    detail: "生の逐次データを (subject,activity) 連続区間ごとに 200サンプル(約10秒@20Hz)の非重複窓へ再窓化。区間内窓化のため各窓は単一活動・単一被験者。不正行(全体の約1%)はスキップ(judgment_calls: J-WISDM-WINDOW)。"
    uncertainty: "窓長・非重複は WISDM 標準に準拠。オーバーラップを入れると窓数増だが相関増。被験者跨ぎリークは group split で防止。"
  - stage: 被験者選択(学習曲線)
    scope: "WISDM v1.1"
    detail: "公式 split が無いため seed-0 シャッフルで 12被験者を固定 held-out test、残り24被験者を pool とする(data/metadata/wisdm.json に記録)。pool から丸ごと N 被験者を seed 決定的に抽選(judgment_calls: J-WISDM-SPLIT)。"
    uncertainty: "test 被験者の引きで到達精度が変わりうるが pool 側の被験者数曲線が主対象。反復3回のため N* の CI は広い見込み(検出力確保は issue #7 候補1 の後続課題)。"
  - stage: ラベル符号化
    scope: "全データセット"
    detail: "出現クラスをソートして 0..K-1 に写像。UCI HAR は元ラベル 1..6 を 0..5 へシフト。"
    uncertainty: "クラス順序は決定的(ソート順)。混同行列・クラス別指標を他実装と比較する際はこの順序に注意。"
  - stage: 層化サブサンプリング(学習比率スイープ)
    scope: "Phase 2(UCR)"
    detail: "学習データのみを対象に、クラスごとに seed 由来の決定的サンプリングで比率を絞る。各クラス最低1サンプルを保持。test には一切適用しない。"
    uncertainty: "小比率ではクラスあたり枚数が少なく、部分集合の引きにより分散が出る。seed 固定で再現可能。"
  - stage: train/val 分割(early stopping 用)
    scope: "1D-CNN"
    detail: "学習データから層化抽出した検証セットで early stopping を行う。val は train 由来のみで、test は early stopping に使わない(spec §8)。"
    uncertainty: "val_fraction は config 定義。分割 seed により学習の停止点が変わりうるが run seed で固定。"
  - stage: 被験者選択(学習曲線)
    scope: "UCI HAR(Phase 4-5)"
    detail: "被験者数 N の各点で、プール(公式 train の21被験者)から丸ごと N 被験者を seed 決定的に抽選する。サンプル単位ではなく被験者単位で増やす。"
    uncertainty: "反復は3回のみで N* の信頼区間が広い(本研究の主要な限界)。固定 held-out test は公式 test の9被験者。"
  - stage: 被験者選択・前処理(PAMAP2, issue #21 DS-2)
    scope: "PAMAP2(Phase 6)"
    detail: "54列 .dat をパース → transient(0)・optional 6活動を除外し 12 protocol 活動へ写像 → 加速度 ±16g 9ch(hand/chest/ankle x/y/z)を選択(orientation/HR/±6g/gyro/mag 除外)→ 100→33.3Hz(stride-3)間引き → (subject,activity) 連続区間内で 168サンプル非重複窓 → 選択チャネルに NaN を含む窓は破棄 → 窓ごと z 正規化。subject 109 は活動サポート実測(総窓10・1/12活動)で機械的に除外し pool=5[101,102,106,107,108]/test=3[103,104,105](seed-0)。被験者単位で N を増やす。"
    uncertainty: "被験者8名(除外後)は下限付近で N* CI が広い。rope_jumping は除外後 pool 4窓・test 0窓と希少でクラス欠落が macro-F1 を不安定化しうる。反復5回・CI 提示で緩和。前処理条件(チャネル数・レート・窓長)は UCI HAR/WISDM と非対称で横断比較の交絡(『dataset に合わせた追試』の位置づけ)。"
  - stage: 被験者選択・前処理(WESAD, issue #21 DS-3)
    scope: "WESAD(Phase 6, 非HAR 生理信号)"
    detail: "被験者ごと SX.pkl を pickle.load(encoding='latin1')(Python2 pickle)でパース → 胸 RespiBAN 生理 5ch(ECG/EDA/EMG/RESP/TEMP)を選択(胸 ACC・手首 E4 は除外)→ label {1,2,3}(baseline/stress/amusement)のみ採用し 0..2 へ写像({0,4,5,6,7}=transient/meditation/ignore は破棄)→ (subject,label) 連続区間ごとに 700→70Hz を反エイリアス LPF(scipy.signal.decimate, zero-phase IIR)経由で間引き → 30秒(2100サンプル)非重複窓 → 選択チャネルに NaN を含む窓は破棄 → 窓ごと・チャネルごと z 正規化。seed-0 で K=5 被験者を固定 held-out test、残り10名を pool(subject_counts={2..10}, repeats=5)。被験者単位で N を増やす。実在被験者ID(S2–S17 の欠番あり 15名)・クラス別窓数は data/metadata/wesad.json に実測記録。"
    uncertainty: "被験者15名(pool10)は下限付近で N* CI が広い見込み。少数派 amusement は少 N でサポートが薄く macro-F1 を不安定化しうる(反復5+CI で緩和、それでも不安定なら停止条件)。30秒非重複で窓が不足し N* 推定不能なら 30秒/50%重複を judgment call(J-WESAD-DS)として許容(被験者非跨りは厳守、重複は窓相関増として注記)。単純間引きは ECG/EMG 高域を折り返すため反エイリアス LPF を挟む。信号種(生理 vs 運動)・タスク(情動3クラス vs 行動)・チャネル数(5)が HAR 3データと異なり §6.5 横断図には同列で載せず信号種で層別する(『dataset に合わせた追試』かつ『信号種軸の外的妥当性』の位置づけ)。ライセンスは非商用+帰属(CC BY ではない)・再配布不可のため生データは非コミット。"
  - stage: 欠損・異常値処理
    scope: "全データセット"
    detail: "UCR アーカイブ・UCI HAR とも配布時点で整形済みのため、欠損補完・外れ値除去は行わない。"
    uncertainty: "独自データへ移植する場合は、この前提(前処理済み・欠損なし)が成り立つか確認が必要。"
